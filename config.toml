# ============================================================
# Stratos1 Trading Bot - Configuration
# All values are configurable. Nothing is hardcoded.
# ============================================================

[general]
timezone = "Europe/Stockholm"
log_level = "INFO"                # DEBUG, INFO, WARNING, ERROR
log_file = "stratos1.log"
db_path = "stratos1.db"
# Client 2026-05-02: every bot restart MUST flatten Bybit + reset
# DB-active trades to a clean slate. No state inheritance across
# restarts. Set to false only for deliberate position-preserving
# restarts (rare).
clean_start_on_restart = true

[wallet]
bot_wallet = 402.1                # Fixed internal theoretical wallet (USDT)
risk_pct = 0.02                   # 2% risk per trade
initial_margin = 20.0             # 20 USDT initial margin per trade

[leverage]
# Client 2026-04-29 (clarified): wallet IM risk = 2% (entry -> SL).
#   raw < 6.75              -> always x6 (min_leverage)
#   6.75 <= raw < 7.5       -> floor to 7.5 (dynamic starts here)
#   7.5  <= raw < 25.0      -> use raw value
#   raw >= 25.0             -> cap to 25 (max_entry_leverage)
min_leverage = 6.0
neutral_zone_split = 6.75
neutral_zone_upper = 7.5
max_entry_leverage = 25.0
scaling_leverage = 50.0           # Leverage after +2.4% scaling step

[entry]
order_type = "Market"             # Market orders for entry
num_entry_orders = 1              # Client final decision 2026-04-23: 1 market order
slippage_tolerance_pct = 0.5      # Max acceptable slippage %
entry_timeout_seconds = 30        # Timeout for fill confirmation

[scaling]
# Step 1: at +2.4%, leverage to x50 + add 20 USDT
# Step 2: at +4.0%, add 20 USDT
# Step 3: at +6.0%, add 20 USDT
# Step 4: at +8.0%, add 20 USDT
# Master ON/OFF switch. Set false for Milestone 1 ('basic bot')
# operation — scaling/pyramid pipeline is bypassed entirely.
# Set true for Milestone 2 ('basic + pyramid').
enabled = false
steps = [
    { trigger_pct = 2.4, add_margin = 20.0, set_leverage = 50.0 },
    { trigger_pct = 4.0, add_margin = 20.0 },
    { trigger_pct = 6.0, add_margin = 20.0 },
    { trigger_pct = 8.0, add_margin = 20.0 },
]

[trailing_stop]
activation_pct = 6.1              # Activate at highest TP or 6.1% (whichever is lower)
trailing_distance_pct = 2.5       # 2.5% trailing distance
trigger_type = "LastPrice"        # Trailing stop trigger (client 2026-04-29: trailing = Last)

[hedge]
# Client 2026-05-01 hedge model (revised, BACKUP-only hard SL):
#   trigger_pct                = -1.5  (Last price, Bybit conditional)
#   hard_sl_pct                = 2.0   (% from hedge's own entry — BACKUP
#                                       only, MUST be further than trailing
#                                       so trailing always exits first)
#   trailing_pct               = 1.2   (Bybit native trailing, Last —
#                                       primary exit)
#   original_force_close_pct   = 2.0   (close original at -2% adverse —
#                                       Phase 2 will move this to a Bybit
#                                       conditional armed at trade open)
#   timeout_minutes            = 20    (close hedge if no meaningful move)
#   no_move_threshold_pct      = 0.5   ("meaningful" = 0.5% from entry)
#   use_bybit_conditional_only = true  (kill bot-side check_and_activate)
enabled = true
trigger_pct = -1.5
max_hedge_count = 1
hard_sl_pct = 2.0
trailing_pct = 1.2
timeout_minutes = 20
no_move_threshold_pct = 0.5
original_force_close_pct = 2.0
use_bybit_conditional_only = true

[reentry]
enabled = true
max_reentries = 2                 # Re-entry fires from Bybit's SL-fill event
                                  # (no polling, no inferred trigger).

[duplicate]
threshold_pct = 5.0               # Block signals for same symbol within 5% entry diff
lookback_hours = 24               # How far back to check for duplicates

[stale_signal]
max_age_seconds = 120             # Reject signals older than 2 minutes

[timeout]
unfilled_order_hours = 24         # Delete unfilled orders after 24 hours

[capacity]
max_active_trades = 500           # Max simultaneous open positions
order_loop_window_seconds = 60    # Time window for order loop detection
order_loop_max_count = 10         # Max orders in window before blocking

[auto_sl]
fallback_pct = 3.0                # Auto-SL at -3% from entry if SL missing
fallback_leverage = 10.0          # Lock leverage to x10 when auto-SL

[reporting]
daily_report_hour = 23            # Hour (24h) to send daily report
weekly_report_day = 0             # 0=Monday
weekly_report_hour = 23           # Hour (24h) to send weekly report
# Phase 6 (client 2026-05-02 audit #11 + #26): post an audit
# snapshot to Telegram every N closed trades. 0 = disabled.
audit_snapshot_every_n_trades = 10

[missed_signal_audit]
# Client 2026-05-04: "we have to monitor all channels and all signals
# — we don't have to miss any signals." Every interval_minutes the
# bot scans its log for messages from monitored channels that never
# reached the operator's Telegram channel ("silent drops") and posts
# a summary IF and only IF silent_drops > 0. Healthy windows produce
# no notification (no spam).
# Set interval_minutes = 0 to disable entirely.
interval_minutes = 30

[tp_sl]
# Client 2026-04-29 spec:
#   Initial SL  -> MarkPrice (sl_initial_trigger_type)
#   Moving SL   -> LastPrice (trigger_type)
#   TP          -> LastPrice (trigger_type)
#   Trailing    -> LastPrice (trailing_stop.trigger_type)
#   Hedge       -> LastPrice (hardcoded in hedge_manager)
trigger_type = "LastPrice"
sl_initial_trigger_type = "MarkPrice"

# ============================================================
# Telegram Source Groups
# Load from separate file or list here
# Format: { id = -100xxx, name = "Group Name" }
# ============================================================
[telegram]
source_groups_file = "telegram_groups.toml"
