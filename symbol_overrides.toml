# ============================================================
# Stratos1 — Operator-managed symbol overrides
#
# Edit this file to:
#   * skip a signal entirely (symbol not on Bybit perp, scam, etc.)
#   * rename a symbol before placing the order (BYBIT lists 1000SHIB
#     instead of SHIB)
#   * attach a free-form note that shows in warning notifications
#     for that symbol (so the operator can see why the bot is
#     behaving a particular way)
#
# Reload: bot reloads this file ONLY on restart. After editing,
# restart the systemd service.
#
# Symbol keys are case-insensitive and the USDT suffix is added
# automatically. Both [SHIB] and [SHIBUSDT] resolve to SHIBUSDT.
#
# Example (DO NOT use these literally — they are illustrative):
#
#   [TAG]
#   skip = true
#   note = "Checked 2026-05-03 — not on Bybit perpetuals"
#
#   [BTC]
#   note = "Operator: high-conviction symbol, watch closely"
# ============================================================

# Tomas 2026-05-07: signals say #1000SHIBUSDT but Bybit's perpetual
# is listed as SHIB1000USDT (search for "SHIB" in the Bybit UI to
# confirm — only SHIB1000USDT and SHIB1000USDC are returned, no
# 1000SHIB-prefixed pairs). Rename so orders go to the correct symbol.
[1000SHIB]
rename_to = "SHIB1000USDT"
note = "Bybit perp is SHIB1000USDT (suffix), not 1000SHIBUSDT (prefix)"

# Tomas 2026-05-12: Crypto Master Vip Signals + American Crypto Traders
# both forward TOSHI signals as #TOSHI/USDT. Bybit demo only lists the
# 1000-prefixed pair (verified via get_instruments_info: TOSHIUSDT
# returns ErrCode 10001 "symbol invalid", 1000TOSHIUSDT returns OK).
# Without this rename every TOSHI signal fails leverage_set and the
# trade never opens.
[TOSHI]
rename_to = "1000TOSHIUSDT"
note = "Bybit perp is 1000TOSHIUSDT, not TOSHIUSDT"

# Tomas 2026-05-12: Panda Traders, Coin Rise, and others post #GUA/USDT
# signals. Bybit demo does not list GUA in any form (neither GUAUSDT
# nor 1000GUAUSDT). Skip silently so the bot stops spamming
# instrument_info_fetch_failed and set_leverage_failed errors for it.
[GUA]
skip = true
note = "Not listed on Bybit perp (any prefix). Skip until/unless Bybit adds it."
